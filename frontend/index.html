<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ConnectX — Premium EV Trip Planner with real-time battery estimates, smart charging suggestions, and weather-aware routing." />
    <title>ConnectX — EV Trip Planner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      html, body { background: #0B0B0B; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="error-overlay" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(255,0,0,0.9); color:white; padding:40px; font-family:monospace; white-space:pre-wrap; overflow-y:auto; font-size:16px;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-overlay').innerHTML += "<strong>ERROR:</strong> " + msg + "\n" + (error ? error.stack : '') + "\n\n";
      };
      window.addEventListener("unhandledrejection", function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-overlay').innerHTML += "<strong>PROMISE ERROR:</strong> " + (e.reason ? e.reason.stack || e.reason : 'Unknown') + "\n\n";
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
